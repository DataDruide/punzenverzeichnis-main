# Netlify Configuration for punzenverzeichnis

[build]
  command = "npm install && npm run build"
  functions = "supabase/functions"
  publish = "dist"

[build.environment]
  NODE_ENV = "production"
  NODE_VERSION = "20.x"

# Redirects for SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://api.github.com; frame-ancestors 'none'; base-uri 'self';"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/dist/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables needed in production
# Set these in Netlify UI under Site settings > Build & deploy > Environment
# Required variables:
# - VITE_SUPABASE_PROJECT_ID
# - VITE_SUPABASE_PUBLISHABLE_KEY
# - VITE_SUPABASE_URL
# - SUPABASE_URL (for functions)
# - SUPABASE_ANON_KEY (for functions)
# - SUPABASE_SERVICE_ROLE_KEY (for functions)

[context.production]
  command = "npm install && npm run build"
  
[context.deploy-preview]
  command = "npm install && npm run build:dev"

[context.branch-deploy]
  command = "npm install && npm run build:dev"
